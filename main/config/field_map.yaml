  # Security deposit: label_row = amount row, label_row+1 = note row
  security_deposit_amount:
    label: "SECURITY DEPOSIT"
    col: F
    row_offset: 0

  security_deposit_note:
    label: "SECURITY DEPOSIT"
    col: E
    row_offset: 1

  advance_rent:
    label: "ADVANCE RENT"
    col: E
    row_offset: 0

  subletting:
    label: "SUB-LETTING"
    col: E
    row_offset: 0

  parking:
    label: "PARKING"
    col: E
    row_offset: 0

  restoration_obligations:
    label: "RESTORATION OBLIGATIONS"
    col: E
    row_offset: 0

# Direct cell writes (row/col are fixed regardless of template version)
direct_writes:
  title: "B4"
